name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -fsSL --retry 6 --retry-delay 8 --retry-all-errors \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Verify google-services.json
        run: |
          echo "File size in bytes:"
          wc -c android/app/google-services.json
          echo "Package names found inside the file:"
          grep -o '"package_name": *"[^"]*"' android/app/google-services.json || echo "NO package_name FIELD FOUND - FILE IS BROKEN"
          echo "First 200 characters of the file:"
          head -c 200 android/app/google-services.json
          echo ""

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias prabhupad-ashraya \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass PrabhupadAshraya2024 \
            -keypass PrabhupadAshraya2024 \
            -dname "CN=PrabhupadAshraya, OU=ISKCON, O=PrabhupadAshraya, L=India, ST=India, C=IN"

      - name: Pre-download Gradle distribution (avoids flaky CDN during build)
        run: |
          mkdir -p "$HOME/gradle-dist"
          curl -fSL --retry 10 --retry-delay 10 --retry-all-errors \
            "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
            -o "$HOME/gradle-dist/gradle-8.7-bin.zip"
          cat > android/gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=file\\://$HOME/gradle-dist/gradle-8.7-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: |
          for attempt in 1 2 3 4; do
            echo "Build attempt $attempt..."
            if ./gradlew assembleRelease --no-daemon; then
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 20s..."
            sleep 20
          done
          exit 1
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: prabhupad-ashraya
          MYAPP_UPLOAD_STORE_PASSWORD: PrabhupadAshraya2024
          MYAPP_UPLOAD_KEY_PASSWORD: PrabhupadAshraya2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prabhupad-ashraya-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Prabhupad Ashraya v${{ github.run_number }}"
          body: |
            ## Download & Install

            1. Download the APK file below
            2. Open it on your Android phone
            3. If asked, allow "Install from unknown sources"
            4. App installs — done!
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
