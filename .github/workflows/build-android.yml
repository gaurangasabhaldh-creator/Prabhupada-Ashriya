name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias prabhupad-ashraya \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass PrabhupadAshraya2024 \
            -keypass PrabhupadAshraya2024 \
            -dname "CN=PrabhupadAshraya, OU=ISKCON, O=PrabhupadAshraya, L=India, ST=India, C=IN"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: prabhupad-ashraya
          MYAPP_UPLOAD_STORE_PASSWORD: PrabhupadAshraya2024
          MYAPP_UPLOAD_KEY_PASSWORD: PrabhupadAshraya2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prabhupad-ashraya-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Prabhupad Ashraya v${{ github.run_number }}"
          body: |
            ## Download & Install

            1. Download the APK file below
            2. Open it on your Android phone
            3. If asked, allow "Install from unknown sources"
            4. App installs — done!
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
